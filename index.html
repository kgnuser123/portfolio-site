<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | New Metal Art</title>
    <!-- Font Awesome for Icons -->
     <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<section class="contact-section">
    <div class="container">
        <div class="contact-wrapper">
            
            <!-- Left Side: Contact Form -->
            <div class="contact-form">
                <h2>Send a Message</h2>
                <form id="mainContactForm">
                    <div class="input-group">
                        <input type="text" id="name" required placeholder="Full Name">
                    </div>
                    <div class="input-group">
                        <input type="email" id="email" required placeholder="Email Address">
                    </div>
                    <div class="input-group">
                        <textarea id="message" rows="5" required placeholder="Your Message..."></textarea>
                    </div>
                    <button type="submit" class="submit-btn">Send Discovery</button>
                </form>
            </div>

            <!-- Right Side: Details & Map -->
            <div class="contact-info">
                <div class="details">
                    <div class="info-item">
                        <i class="fas fa-location-dot"></i>
                        <p>123 Metal Street, Design District, India</p>
                    </div>
                    <div class="info-item">
                        <i class="fas fa-phone"></i>
                        <p>+91 98765 43210</p>
                    </div>
                    <div class="info-item">
                        <i class="fas fa-envelope"></i>
                        <p>contact@newmetalart.com</p>
                    </div>
                </div>

                <!-- Google Map Embed -->
                <div class="map-container">
                    <iframe 
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3502.562010212356!2d77.2090!3d28.6139!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMjjCsDM2JzUwLjAiTiA3N8KwMTInMzIuNCJF!5e0!3m2!1sen!2sin!4v1620000000000!5m2!1sen!2sin" 
                        width="100%" height="250" style="border:0;" allowfullscreen="" loading="lazy">
                    </iframe>
                </div>
            </div>

        </div>
    </div>
</section>
<section class="header">
    <h1>Welcome to heading</h1>
</section>
<script src="script.js"></script>

</body>
</html>
